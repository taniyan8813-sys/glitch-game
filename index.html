<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLITCH SURVIVE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="gameScreen" class="game-screen">
    <header class="game-hud">
      <div class="hud-panel hud-status" aria-label="Player status">
        <div class="status-row status-row-compact">
          <span class="status-label">LV</span>
          <span id="levelValue" class="status-value">1</span>
        </div>
        <div class="status-row">
          <span class="status-label">HP</span>
          <div class="status-bar" aria-hidden="true">
            <div id="hpFill" class="status-fill hp-fill"></div>
          </div>
          <span id="hpValue" class="status-value">3/3</span>
        </div>
      </div>

      <h1 class="hud-title">GLITCH SURVIVE</h1>

      <div class="hud-panel hud-metrics" aria-label="Survival status">
        <div class="metric">
          <span class="score-label">TIME</span>
          <span id="timeValue" class="score-value">0:00</span>
        </div>
        <div class="metric">
          <span class="score-label">KILLS</span>
          <span id="killsValue" class="score-value">0</span>
        </div>
      </div>

      <div class="hud-panel hud-exp" aria-label="Experience">
        <div class="status-row">
          <span class="status-label">EXP</span>
          <div class="status-bar" aria-hidden="true">
            <div id="expFill" class="status-fill exp-fill"></div>
          </div>
          <span id="expValue" class="status-value">0%</span>
        </div>
      </div>
      <button id="muteButton" class="mute-button" type="button" aria-pressed="false">MUTE</button>
    </header>

    <div id="virtualJoystick" class="virtual-joystick" aria-hidden="true">
      <div id="joystickKnob" class="joystick-knob"></div>
    </div>

    <div id="bulletLayer" class="bullet-layer" aria-hidden="true"></div>
    <div id="enemyLayer" class="enemy-layer" aria-hidden="true"></div>
    <div id="attackLayer" class="attack-layer" aria-hidden="true"></div>
    <div id="expLayer" class="exp-layer" aria-hidden="true"></div>
    <div id="hitFlash" class="hit-flash" aria-hidden="true"></div>

    <div id="player" class="player">
      <div class="player-visual">
        <img id="glitchImage" class="glitch-image glitch-image-normal" src="assets/player_idle.png" alt="Glitch">
        <img class="glitch-image glitch-image-bug" src="assets/player_glitch.png" alt="" aria-hidden="true">
        <img class="glitch-image glitch-image-hit" src="assets/player_glitch.png" alt="" aria-hidden="true">
        <img class="glitch-noise" src="assets/glitch_effect.png" alt="" aria-hidden="true">
      </div>
    </div>
    <div id="hitboxDebug" class="hitbox-debug" hidden></div>

    <p id="imageError" class="image-error" hidden>画像が見つかりません</p>

    <section id="upgradePanel" class="upgrade-panel" hidden>
      <div class="upgrade-content">
        <p class="upgrade-kicker">LEVEL UP</p>
        <h2>CHOOSE UPGRADE</h2>
        <div id="upgradeOptions" class="upgrade-options"></div>
      </div>
    </section>

    <section id="gameOverPanel" class="game-over-panel" hidden>
      <div class="game-over-content">
        <p class="game-over-kicker">GLITCH DETECTED</p>
        <h2>GAME OVER</h2>
        <button id="restartButton" type="button">もう一度プレイ</button>
      </div>
    </section>

    <footer class="site-footer">
      <a href="privacy.html">プライバシーポリシー</a>
    </footer>
  </main>
  <script src="script.js"></script>
</body>
</html>
